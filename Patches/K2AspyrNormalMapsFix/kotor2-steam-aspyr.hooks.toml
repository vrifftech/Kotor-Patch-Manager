# PartTriMesh::GetRenderPath() Steam Aspyr 0x004A7070
# Inserts a Pre-Aspyr-style combined env+bump mode-2 gate immediately before
# the existing Steam Aspyr mode-8 and mode-11 env branches.
#
# Hook site: 0x004A71A0, replacing the original mode-8 block and replaying it
# in the replacement code before falling through to the original mode-11 block.
#
# New gate checks:
#   [ebp-0x11] != 0   Material strict env/reflection predicate, Material+0x14
#   [ebp-0x07] != 0   Material::HasBumpMap(), Material+0x10
#   [ebp-0x08] != 0   MdlNodeTriMesh::HasTangentBases()
#   [0x009F635C] != 0 Steam global corresponding to GOG 0x009F6CE4 / Pre-Aspyr 0x0080D684
#   AurNV2xLevelShadersAvailable() at 0x004844C0 returns true
# If true: sets mode 2 and jumps to GetRenderPath epilogue at 0x004A720D.
# If false: replays the original mode-8 block, then falls through to 0x004A71C2.

