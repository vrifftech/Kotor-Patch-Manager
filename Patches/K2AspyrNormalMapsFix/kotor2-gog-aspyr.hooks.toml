# PartTriMesh::GetRenderPath()
# Inserts a Pre-Aspyr-style combined env+bump mode-2 gate immediately before
# the existing mode-8 and mode-11 env branches.
# Hook site: 0x0088DD60, replacing the original mode-8 block and replaying it
# in the replacement code before falling through to the original mode-11 block.
#
# New gate checks:
#   [ebp-0x11] != 0   Material strict env/reflection predicate, Material+0x14
#   [ebp-0x07] != 0   Material::HasBumpMap(), Material+0x10
#   [ebp-0x08] != 0   MdlNodeTriMesh::HasTangentBases()
#   [0x009F6CE4] != 0 GOG global corresponding to Pre-Aspyr 0x0080D684
#   AurNV2xLevelShadersAvailable() at 0x0086B250 returns true
# If true: sets mode 2 and jumps to GetRenderPath epilogue at 0x0088DDCD.
# If false: replays the original mode-8 block, then falls through to 0x0088DD82.

[[hooks]]
address = 0x0088DD1E
type = "replace"
original_bytes = [
    0x0F, 0xB6, 0x4D, 0xEE, 0x85, 0xC9, 0x74, 0x0C, 0xC7, 0x45, 0xFC, 0x01, 0x00, 0x00, 0x00, 0xE9,
    0x9B, 0x00, 0x00, 0x00
]
replacement_bytes = [
    0x0F, 0xB6, 0x55, 0xEF, 0x85, 0xD2, 0x74, 0x32, 0x0F, 0xB6, 0x45, 0xF9, 0x85, 0xC0, 0x74, 0x2A,
