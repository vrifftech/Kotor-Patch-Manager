[patch]
id = "kotor2-desteamify"
name = "KOTOR2 DeSteamify"
version = "0.1.0"
author = "Vriff"
description = "Removes the Steam Aspyr executable's static steam_api.dll import descriptor and neutralizes Steamworks startup/callback/UGC/stat call sites so the game can be launched by a custom launcher without Steamworks gating. Targeted only at the uploaded KOTOR2 Steam Aspyr executable."

