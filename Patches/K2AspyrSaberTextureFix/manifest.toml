[patch]
id = "k2-aspyr-saber-hilt-texture-fix"
name = "K2 Aspyr Saber Hilt Texture Fix"
version = "1.0.0"
author = "Vriff"
description = "Fixes Aspyr KOTOR2 lightsaber hilt diffuse/detail loss by NOPing the PartEmitter small-particle fast-path cleanup block that disables GL_TEXTURE_COORD_ARRAY. This leaves the GL_COLOR_ARRAY cleanup intact and removes only the existing GL_TEXTURE_COORD_ARRAY disable sequence."

